<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>منصة النماذج الاسترشادية التفاعلية | محمود عبدالسيد</title>
<style>
:root{
  --ink:#132743;
  --ink-2:#1f3b63;
  --paper:#faf6ee;
  --paper-2:#f1ead9;
  --gold:#c99a3f;
  --gold-2:#e8c579;
  --good:#2f7d5b;
  --good-bg:#e5f3ec;
  --bad:#b5453a;
  --bad-bg:#fbe9e6;
  --line:#e1d6bd;
  --shadow: 0 8px 24px rgba(19,39,67,.14);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0;
  background:
    radial-gradient(1200px 500px at 100% -10%, #1c3253 0%, transparent 60%),
    var(--paper);
  color:var(--ink);
  font-family: "Segoe UI","Tahoma","Geeza Pro","Arial",sans-serif;
  font-size:19px;
  line-height:1.65;
  overscroll-behavior:none;
}
.eng{ direction:ltr; unicode-bidi:isolate; font-family:"Georgia","Times New Roman",serif; }

/* ===== Top bar ===== */
.topbar{
  position:sticky; top:0; z-index:40;
  display:flex; align-items:center; gap:10px;
  background:linear-gradient(180deg, var(--ink) 0%, var(--ink-2) 100%);
  color:#fdf6e6; padding:12px 14px;
  box-shadow:var(--shadow);
}
.topbar .brandmark{
  font-weight:800; font-size:17px; letter-spacing:.3px;
  display:flex; align-items:center; gap:8px; white-space:nowrap;
}
.brandmark .dot{width:9px;height:9px;border-radius:50%;background:var(--gold-2);box-shadow:0 0 8px var(--gold-2);}
.topbar .spacer{flex:1;}
.icon-btn{
  background:rgba(255,255,255,.09); border:1px solid rgba(255,255,255,.18);
  color:#fdf6e6; width:42px; height:42px; border-radius:12px;
  font-size:19px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:.15s;
}
.icon-btn:active{transform:scale(.92); background:rgba(255,255,255,.2);}

/* ===== Layout ===== */
.app{ display:flex; min-height:calc(100% - 66px); }
.sidebar{
  width:230px; flex:0 0 230px; background:var(--ink);
  color:#eadfc3; padding:14px 10px 90px; transition:.25s;
  overflow-y:auto;
}
.sidebar.collapsed{ width:62px; flex-basis:62px; padding:14px 6px 90px; }
.sidebar.collapsed .test-label{ display:none; }
.sidebar.collapsed .test-btn{ justify-content:center; padding:12px 0; }
.side-title{ font-size:13px; opacity:.65; margin:2px 8px 10px; letter-spacing:.5px;}
.sidebar.collapsed .side-title{ display:none; }
.test-btn{
  width:100%; text-align:right; display:flex; align-items:center; gap:10px;
  background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);
  color:#eadfc3; padding:12px 12px; border-radius:12px; margin-bottom:8px;
  font-size:15.5px; cursor:pointer; font-weight:600;
}
.test-btn .num{
  width:28px;height:28px;border-radius:8px;background:rgba(233,197,121,.15);
  color:var(--gold-2); display:flex;align-items:center;justify-content:center;
  font-weight:800; flex:0 0 28px; font-size:14px;
}
.test-btn.active{ background:linear-gradient(90deg, var(--gold), var(--gold-2)); color:#20334f; border-color:transparent;}
.test-btn.active .num{ background:rgba(32,51,79,.18); color:#20334f;}
.test-btn .tag{ margin-inline-start:auto; font-size:11px; opacity:.8; }
.test-btn.locked{ opacity:.55; }

.main{ flex:1; min-width:0; padding:18px 16px 120px; }

/* ===== Controls row ===== */
.controlbar{
  display:flex; flex-wrap:wrap; align-items:center; gap:10px;
  background:#fff; border:1px solid var(--line); border-radius:16px;
  padding:10px 14px; margin-bottom:16px; box-shadow:var(--shadow);
}
.controlbar .grp{ display:flex; align-items:center; gap:8px; font-size:14.5px; color:#5a4c2f;}
.controlbar input[type=range]{ width:110px; accent-color:var(--gold);}
.pill-btn{
  border:none; border-radius:999px; padding:8px 14px; font-size:14px; font-weight:700;
  cursor:pointer; background:var(--paper-2); color:var(--ink); border:1px solid var(--line);
}
.pill-btn.primary{ background:var(--ink); color:#fdf6e6; }

/* ===== Test header ===== */
.test-header{
  background:linear-gradient(120deg, var(--ink), var(--ink-2));
  color:#fdf6e6; border-radius:18px; padding:20px 20px; margin-bottom:18px;
  box-shadow:var(--shadow); position:relative; overflow:hidden;
}
.test-header::after{
  content:""; position:absolute; inset:0; background:
   radial-gradient(200px 200px at 90% 0%, rgba(233,197,121,.25), transparent 70%);
}
.test-header h2{ margin:0 0 4px; font-size:24px; position:relative;}
.test-header p{ margin:0; opacity:.85; font-size:14.5px; position:relative;}

/* ===== Cards ===== */
.card{
  background:#fff; border:1px solid var(--line); border-radius:16px;
  margin-bottom:14px; box-shadow:var(--shadow); overflow:hidden;
}
.card-head{
  display:flex; align-items:center; gap:10px; padding:14px 16px 6px;
  background:var(--paper-2);
}
.card-head .qnum{
  flex:0 0 34px; height:34px; border-radius:10px; background:var(--ink);
  color:var(--gold-2); font-weight:800; display:flex; align-items:center; justify-content:center;
  font-size:14.5px;
}
.qtitle-wrap{ flex:1; display:flex; align-items:center; gap:10px; cursor:pointer; min-width:0; }
.card-head .qtitle{ flex:1; font-weight:700; font-size:15.5px; color:#4a4023;}
.chev{ transition:.2s; font-size:14px; opacity:.6; }
.card.open .chev{ transform:rotate(180deg); }
.quick-tools{
  display:flex; gap:8px; flex-wrap:wrap; padding:2px 16px 12px; background:var(--paper-2);
}
.tool-btn{
  border:1px solid var(--gold); background:#fff; color:#6b5220; border-radius:999px;
  padding:6px 12px; font-size:13px; font-weight:700; cursor:pointer;
}
.tool-btn.stop{ background:var(--bad); color:#fff; border-color:var(--bad); }
.prompt-ar{
  display:none; margin:0 16px 12px; background:#eef3ee; border-inline-start:4px solid var(--good);
  padding:10px 12px; border-radius:10px; font-size:16.5px; color:#274a37;
}
.prompt-ar.show{ display:block; }
.mini-tr-btn{
  border:none; background:var(--paper-2); border-radius:8px; width:26px; height:26px;
  font-size:13px; cursor:pointer; flex:0 0 26px; margin-inline-start:6px;
}
.opt-body{ display:flex; align-items:flex-start; flex-wrap:wrap; gap:2px; flex:1; }
.opt-ar{
  display:none; width:100%; margin-top:6px; background:#eef3ee; border-radius:8px;
  padding:6px 10px; font-size:15.5px; color:#274a37;
}
.opt-ar.show{ display:block; }
.card-body{ display:none; padding:16px; }
.card.open .card-body{ display:block; }

.passage-card .card-head{ background:linear-gradient(90deg,#efe3c4,#f6efdc); }
.passage-text{ font-size:17.5px; line-height:1.85; }
.pseg-block{ margin-bottom:10px; }
.pseg-en{ display:block; }
.pseg-ar-line{
  display:none; margin-top:5px; background:#eef3ee; border-inline-start:3px solid var(--good);
  padding:7px 11px; border-radius:8px; font-size:15.5px; line-height:1.75; color:#274a37;
}
.pseg-ar-line.show{ display:block; }
.pseg{ transition: background-color .2s ease, box-shadow .2s ease, color .2s ease; border-radius:5px; padding:1px 2px; }
.pseg.active{ background:var(--gold-2); color:#2b2308; box-shadow:0 0 0 2px rgba(201,154,63,.45); }
.tool-btn.active-tr{ background:var(--gold); color:#2b2308; border-color:var(--gold); }

.q-prompt{ font-size:18px; margin-bottom:12px; font-weight:600;}
.options{ display:grid; gap:9px; margin-bottom:14px; }
.opt{
  border:1.5px solid var(--line); border-radius:12px; padding:10px 12px;
  display:flex; gap:10px; align-items:flex-start; font-size:16.5px;
}
.opt .lab{ font-weight:800; color:var(--ink-2); flex:0 0 20px; }
.opt.correct{ border-color:var(--good); background:var(--good-bg); }
.opt.correct .lab{ color:var(--good); }
.opt.wrong-marked{ border-color:var(--bad); background:var(--bad-bg); opacity:.85; }
.opt{ cursor:pointer; user-select:none; }
.opt:active{ transform:scale(.98); }
.opt-click{ display:flex; gap:10px; align-items:flex-start; flex:1; min-width:0; }
.opt-speak{
  flex:0 0 32px; width:32px; height:32px; border-radius:50%; margin-inline-start:auto;
  border:1.5px solid var(--gold); background:#fff; color:#8a6a1f; font-size:14px;
  display:flex; align-items:center; justify-content:center; cursor:pointer; transition:.18s;
}
.opt-speak:active{ transform:scale(.9); }
.opt-speak.playing{ background:var(--gold); color:#2b2308; box-shadow:0 0 0 4px rgba(201,154,63,.25); }
@keyframes pulseGlow{
  0%,100%{ box-shadow:0 0 0 0 rgba(201,154,63,.38); }
  50%{ box-shadow:0 0 0 9px rgba(201,154,63,.10); }
}
.opt.opt-glow{ border-color:var(--gold); background:#fffaf0; animation:pulseGlow 1s ease-in-out infinite; }
@keyframes shakeX{
  10%,90%{ transform:translateX(-2px); }
  20%,80%{ transform:translateX(4px); }
  30%,50%,70%{ transform:translateX(-7px); }
  40%,60%{ transform:translateX(7px); }
}
.opt.shake-wrong{ border-color:var(--bad); background:var(--bad-bg); animation:shakeX .45s ease; }
@keyframes correctPop{
  0%{ transform:scale(1); }
  35%{ transform:scale(1.035); }
  100%{ transform:scale(1); }
}
.opt.correct{ animation:correctPop .45s ease; }
.confetti-piece{
  position:fixed; width:7px; height:10px; border-radius:2px; pointer-events:none; z-index:999;
  animation:confettiFly .85s cubic-bezier(.2,.7,.3,1) forwards;
}
@keyframes confettiFly{
  to{ transform:translate(var(--dx), var(--dy)) rotate(var(--rot)); opacity:0; }
}
@keyframes badgePop{
  0%{ transform:scale(0) rotate(-15deg); opacity:0; }
  60%{ transform:scale(1.15) rotate(6deg); opacity:1; }
  100%{ transform:scale(1) rotate(0); opacity:1; }
}
.correct-badge{
  position:fixed; z-index:1000; font-size:26px; pointer-events:none;
  animation:badgePop .5s ease forwards, badgeFade .5s ease .5s forwards;
}
@keyframes badgeFade{ to{ opacity:0; transform:translateY(-25px) scale(.8); } }

.reveal-btn{
  width:100%; padding:12px; border-radius:12px; border:none; cursor:pointer;
  background:var(--gold); color:#2b2308; font-weight:800; font-size:15.5px;
}
.answer-box{ margin-top:14px; border-top:2px dashed var(--line); padding-top:14px; display:none; }
.answer-box.show{ display:block; }
.correct-line{ font-weight:800; color:var(--good); margin-bottom:8px; font-size:16px;}
.explain{
  background:#fbf7ec; border-inline-start:4px solid var(--gold); border-radius:10px;
  padding:12px 14px; font-size:16.5px; line-height:1.8; color:#3a3120;
}
.speak-row{ display:flex; gap:8px; margin-top:10px; }
.speak-btn{
  border:none; border-radius:10px; padding:9px 14px; font-size:14.5px; font-weight:700;
  background:var(--ink); color:#fdf6e6; cursor:pointer; display:flex; align-items:center; gap:6px;
}
.speak-btn.stop{ background:var(--bad); }
.model-answer{ font-size:16.5px; line-height:1.85; background:#fbf7ec; border-radius:10px; padding:14px; border-inline-start:4px solid var(--good);}

.pending-wrap{
  text-align:center; padding:60px 20px; color:#7a6c46; background:#fff;
  border:1px dashed var(--line); border-radius:18px;
}
.pending-wrap .big{ font-size:44px; margin-bottom:10px;}

/* ===== Brand footer (always visible, small) ===== */
.brandbar{
  position:fixed; bottom:12px; inset-inline:0; display:flex; justify-content:center;
  z-index:50; pointer-events:none;
}
.brandbar a{
  pointer-events:auto;
  display:flex; align-items:center; gap:8px;
  background:rgba(19,39,67,.92); color:#f3e6c2; text-decoration:none;
  padding:8px 14px; border-radius:999px; font-size:13px; font-weight:700;
  box-shadow:0 6px 18px rgba(0,0,0,.35); border:1px solid rgba(233,197,121,.4);
  backdrop-filter:blur(4px);
}
.brandbar .sep{ opacity:.5; }

@media (max-width:640px){
  body{font-size:17.5px;}
  .sidebar{ position:fixed; inset-inline-start:0; top:66px; bottom:0; z-index:45; width:230px;
    transform:translateX(105%); box-shadow:-10px 0 30px rgba(0,0,0,.35); }
  html[dir="rtl"] .sidebar{ transform:translateX(105%); }
  .sidebar.mobile-open{ transform:translateX(0); }
  .sidebar.collapsed{ transform:translateX(105%); }
  .backdrop{ display:none; position:fixed; inset:66px 0 0 0; background:rgba(10,16,28,.45); z-index:40; }
  .backdrop.show{ display:block; }
  .main{ padding:14px 10px 120px; }
  .test-header h2{ font-size:20px; }
}
:focus-visible{ outline:3px solid var(--gold); outline-offset:2px; }
</style>
</head>

const PASSAGE_1 = `A few years ago, while I was on holiday in Sinai near Saint Catherine, I stopped for the night in a small desert village.
It was a poor place, and there was no real hotel, but the owner of a local restaurant, Mr. Hassan, kindly offered me a bed for the night.
"Please wait here," he said, pointing to a wooden table outside.
"I'll prepare your room."
The evening was beautiful.
The sun was setting behind the rugged mountains, and the stars were just beginning to appear.
Families were lighting small fires to cook their evening meals, and the pleasant smell of wood smoke filled the cool desert air.
Then I realized I was no longer alone.
An old man with a long white beard had quietly sat at the table beside me.
His clothes were dusty and almost in rags.
"How can I help you?" I asked.
"Let me tell your fortune, sir," he said.
I laughed.
"I don't believe in that kind of thing."
But he gently held my hand and refused to let go.
"Very well," I said.
"First, tell me about my past.
If you can do that, I'll let you talk about the future."
He read my palm lines in silence and then began to describe my childhood in Alexandria, my family, and even places where I had lived and worked in other cities.
Every word was true!
"Stop!" I cried.
"How do you know all this?"
"I know about the past, the present, and even the future," he whispered.
"Do you want to hear it?"
I hesitated.
Just then, Mr. Hassan returned.
"Your room is ready, sir.
Were you talking to someone?"
I looked around, but the old man had vanished.
The owner smiled, "Oh, that must be Mahmoud, the village mysterious man.
He always thinks he can tell fortunes!"`;

const PASSAGE_1_AR = `منذ عدة سنوات، بينما كنت في عطلة في سيناء بالقرب من سانت كاترين، توقفت لأمضي الليلة في قرية صغيرة في الصحراء.
كان مكانًا فقيرًا، ولم يكن هناك فندق حقيقي، لكن صاحب أحد المطاعم المحلية، السيد حسن، عرض عليّ بلطف سريرًا لأنام فيه تلك الليلة.
"من فضلك انتظر هنا،" قال، مشيرًا إلى طاولة خشبية بالخارج.
"سأجهّز لك الغرفة."
كان المساء جميلاً.
كانت الشمس تغرب خلف الجبال الوعرة، وبدأت النجوم في الظهور.
كانت العائلات تشعل نيرانًا صغيرة لطهي وجبتها المسائية، وامتلأ هواء الصحراء البارد برائحة دخان الخشب الممتعة.
ثم أدركت أنني لم أعد وحدي.
كان رجل عجوز ذو لحية بيضاء طويلة قد جلس بهدوء على الطاولة بجواري.
كانت ملابسه مغبرّة وشبه ممزقة.
"كيف يمكنني مساعدتك؟" سألته.
"دعني أخبرك بطالعك يا سيدي،" قال.
ضحكت.
"أنا لا أؤمن بهذا النوع من الأشياء."
لكنه أمسك يدي برفق ورفض أن يتركها.
"حسنًا،" قلت.
"أولاً، أخبرني عن ماضيّ.
إن استطعت فعل ذلك، سأدعك تتحدث عن المستقبل."
قرأ خطوط كفّي في صمت، ثم بدأ يصف طفولتي في الإسكندرية، وعائلتي، وحتى الأماكن التي عشت وعملت فيها في مدن أخرى.
كانت كل كلمة صحيحة!
"توقف!" صرخت.
"كيف تعرف كل هذا؟"
"أنا أعرف الماضي والحاضر بل وحتى المستقبل،" همس.
"هل تريد أن تسمعه؟"
ترددت.
وفي تلك اللحظة، عاد السيد حسن.
"غرفتك جاهزة يا سيدي.
هل كنت تتحدث مع أحد؟"
نظرت حولي، لكن الرجل العجوز قد اختفى.
ابتسم صاحب المطعم وقال: "أوه، لا بد أنه محمود، رجل القرية الغامض.
إنه دائمًا يظن أنه يستطيع قراءة الطالع!"`;

const PASSAGE_2 = `In recent decades, the world has faced serious environmental challenges such as climate change, air pollution, and the depletion of natural resources.
As a result, many countries have turned to renewable energy sources as a sustainable solution for the future.
Renewable energy comes from natural sources that are continuously renewed, such as sunlight, wind, water, and geothermal heat.
Unlike fossil fuels, these sources do not produce harmful greenhouse gases when used to generate electricity.
One of the most popular forms of renewable energy is solar power.
Solar panels capture sunlight and convert it into electricity through a process known as the photovoltaic effect.
The cost of solar technology has dropped significantly over the past decade, making it more accessible to homes and businesses.
Another important source is wind energy, produced when turbines convert the movement of air into mechanical power.
Wind farms, both on land and at sea, now supply a large portion of electricity in many European countries.
Hydropower, which uses flowing water to generate electricity, remains one of the oldest and most reliable energy sources.
In addition, geothermal energy, which harnesses heat from beneath the Earth's surface, provides a steady source of power in countries such as Iceland and New Zealand.
However, renewable energy also faces challenges.
Solar and wind power depend on weather conditions, while building large dams for hydropower can affect local ecosystems.
To overcome these issues, scientists are working on advanced energy storage systems and more efficient technologies.
Despite these challenges, renewable energy offers a path to a cleaner, healthier planet.
By investing in sustainable solutions today, we can protect our environment and ensure that future generations enjoy a safe and prosperous world.`;

const PASSAGE_2_AR = `في العقود الأخيرة، واجه العالم تحديات بيئية خطيرة مثل التغير المناخي، وتلوث الهواء، واستنزاف الموارد الطبيعية.
ونتيجة لذلك، لجأت العديد من الدول إلى مصادر الطاقة المتجددة باعتبارها حلاً مستدامًا للمستقبل.
تأتي الطاقة المتجددة من مصادر طبيعية تتجدد باستمرار، مثل ضوء الشمس والرياح والماء والحرارة الأرضية.
وخلافًا للوقود الأحفوري، لا تُنتج هذه المصادر غازات دفيئة ضارة عند استخدامها لتوليد الكهرباء.

  {id:36, type:"translate", prompt:"Man has always explored the world in a try to understand and discover the secrets of the cosmos. He could never resist the desire to find out what's beyond our planet in space.",
    dirType:"ar", options:{
      a:"لقد كان الإنسان دائمًا يستكشف العالم في محاولة لفهم واكتشاف أسرار الطبيعة، ولم يستطع أبدًا أن يقاوم رغبته في معرفة ما وراء كوكبنا في الفضاء.",
      b:"لقد كان الإنسان دائمًا يستكشف العالم في محاولة لفهم واكتشاف أسرار الكون، ولم يستطع أبدًا أن يقاوم رغبته في معرفة ما وراء كوكبنا في الفضاء.",
      c:"لطالما استكشف الإنسان العالم بحثًا عن أسرار الكون، ولم يفكر يومًا فيما وراء كوكبنا في الفضاء.",
      d:"كان الإنسان يحاول أحيانًا استكشاف العالم لفهم أسرار الوجود، وتخلى عن رغبته في معرفة ما وراء كوكبنا."},
    correct:"b", explain:"الترجمة (ب) هي الأدق لأنها تنقل كلمة cosmos بمعنى (الكون) وليس (الطبيعة)، وتترجم عبارة could never resist the desire بمعناها الصحيح (لم يستطع أبدًا أن يقاوم رغبته)، بينما تحرّف بقية الترجمات المعنى الأصلي أو تعكسه تمامًا."},
  {id:37, type:"translate", prompt:"Land transport can be said to have begun with the invention of the wheel in Mesopotamia over 5,000 years ago. Before that, if one wanted to travel, one walked or rode on the back of an animal.",
    dirType:"ar", options:{
      a:"يمكن القول إن النقل البري بدأ باختراع العجلة في بلاد الرافدين منذ أكثر من خمسة آلاف عام. وقبل ذلك، إذا أراد شخص أن يسافر، فكان يسير على قدميه أو يمتطي ظهر حيوان.",
      b:"يُعتقد أن السباق الأرضي بدأ مع اختراع الدراجة في بلاد الرافدين منذ خمسة آلاف سنة، وقبل هذا إذا أراد الشخص السفر فإنه كان يسير على قدميه أو يمتطي ظهر حيوان.",
      c:"يقال إن النقل البري بدأ مع اكتشاف العجلة في بلاد الرافدين منذ خمسة آلاف سنة، وبعد هذا إذا أراد الشخص السفر فإنه كان يمشي أو يمتطي ظهر حيوان.",
      d:"يعتقد أن النقل الأرضي بدأ مع اختراع العجلة في بلاد الرافدين منذ خمسة آلاف سنة، وفوق هذا إذا أراد شخص السفر فإنه كان يمشي أو يمتطي ظهر حيوان."},
    correct:"a", explain:"الترجمة (أ) وحدها تنقل المعنى بدقة: اختراع العجلة (wheel) وليس الدراجة، وتترجم Before that بمعناها الصحيح (وقبل ذلك)، بينما تستبدل بقية الترجمات كلمة wheel بكلمة خاطئة أو تعكس الظرف الزمني (بعد/فوق بدلاً من قبل)."},
  {id:38, type:"translate", prompt:"المستشفى مؤسسة شديدة التعقيد ومصممة للتعامل مع العديد من المشاكل. ويمكن أن نرى هذا بالنظر عن قرب فيما يحدث مع مختلف أنواع المرضى الذين يتلقون فيها العلاج.",
    dirType:"en", options:{
      a:"The hospital is a very complex formation and is designed to deal with a variety of problems. We can see this by locking closely at what happens to the different types of patients who are treated in it.",

  {id:39, type:"translate", prompt:"الناس لديها أسباب مختلفة للالتحاق بالجامعة. فالبعض يريد ببساطة أن يتعلم أن يكون مستقلاً والبعض ينظر إليها على أنها تجربة مختلفة، ولكن الغالبية يذهبون للجامعة للشغف الحقيقي والاهتمام بالعلم الذي يدرسونه.",
    dirType:"en", options:{
      a:"People have different reasons for joining university. Some simply want to learn to be independent; others regard it as a different experience. The majority, however, go to university for the real passion and interest in the science they are studying.",
      b:"People have different factors for going to university. Some simply want to learn to be independent, others regard it as a different opportunity. Most people, however, go to university for a real passion and interest in the science they are studying.",

  {id:40, type:"essay", prompt:"How far do you think Edmund's revenge of his enemies compensated for his loss?",
    model:"Edmund's revenge brought him power and wealth, but it did not truly compensate for his loss. Although he succeeded in punishing those who betrayed him, he lost many years of his life in prison. Revenge also made him more isolated and distrustful of others.",
    explain:"النقطة الأولى: الثروة والسلطة التي حصل عليها إدموند لا تعوّضانه عن سنوات عمره الضائعة ظلمًا في السجن. النقطة الثانية: الانتقام جعله شخصًا معزولًا لا يثق بالآخرين، وهو ثمن نفسي باهظ رغم تحقيق العدالة الظاهرية."},
  {id:41, type:"essay", prompt:"Who do you think deserved Edmund's greatest punishment? Why?",
    model:"Fernand deserved Edmund's greatest punishment because he betrayed him out of jealousy. He falsely accused Edmund of treason in order to marry Mercedes. His betrayal destroyed Edmund's life and caused him to spend many years in prison.",
    explain:"السبب الأول: خيانة فرنان كانت مدفوعة بالغيرة الشخصية والرغبة في الزواج من ميرسيدس. السبب الثاني: خيانته كانت السبب المباشر في سجن إدموند سنوات طويلة، مما يجعله الأكثر استحقاقًا للعقاب مقارنة بباقي الشخصيات."},
  {id:42, type:"essay5", prompt:"\"Schools can be attractive in four ways\"",
    model:"Schools can be attractive in several important ways. First, they should provide a clean and safe environment for students. Second, modern technology such as computers and smart boards can make learning more interesting. Third, schools should organize sports and cultural activities that develop students' talents. Finally, supportive teachers who encourage creativity and participation make school life enjoyable. When these factors are available, students feel motivated and excited to learn.",
    modelAr:"يمكن أن تكون المدارس جذابة بعدة طرق مهمة. أولًا، يجب أن توفر بيئة نظيفة وآمنة للطلاب. ثانيًا، يمكن للتكنولوجيا الحديثة مثل الحواسيب والسبورات الذكية أن تجعل التعلم أكثر تشويقًا. ثالثًا، يجب على المدارس تنظيم أنشطة رياضية وثقافية تنمّي مواهب الطلاب. وأخيرًا، فإن المعلمين الداعمين الذين يشجعون الإبداع والمشاركة يجعلون الحياة المدرسية ممتعة. وعندما تتوافر هذه العوامل، يشعر الطلاب بالحافز والحماس للتعلم.",
    explain:"هذه فقرة نموذجية تضم أربع نقاط مرتبطة بروابط تسلسلية واضحة (First, Second, Third, Finally)، تغطي: البيئة الآمنة، التكنولوجيا، الأنشطة، والمعلمين الداعمين، وتنتهي بخلاصة تربط هذه العوامل بدافعية الطالب — وهو الهيكل المطلوب بالضبط في سؤال الفقرة المكوّنة من أربع طرق."},
];

  {id:36, type:"translate", prompt:"It is said that accepting others is a polite and important quality everyone should have. You can share your own opinion while also respecting what others think.",
    dirType:"ar", options:{

    correct:"a", explain:"الترجمة (a) هي الأدق لأنها تترجم accepting others بمعناها الصحيح (قبول الآخرين)، وpolite and important quality بدقة (صفة مهذبة وهامة)، وتحافظ على معنى share your own opinion while respecting (مشاركة رأيك مع احترام أفكار الآخرين في آن واحد)؛ بينما تُخطئ (b) بتحويل الفعل إلى صيغة الغائب (يمكنهم) بدلاً من المخاطب، وتُخطئ (c) بترجمة polite إلى (احترافية)، وتُخطئ (d) بترجمة important إلى (سطحية) وهو عكس المعنى تمامًا وتحذف رابط 'while' الصحيح."},
  {id:37, type:"translate", prompt:"Global warming is not only a future danger to our health; it is already causing thousands of deaths every year, according to experts at the World Health Organization.",
    dirType:"ar", options:{

      c:"ظاهرة الاحتباس الحراري ليست مجرد خطر مستقبلي على صحتنا؛ حيث إنها تتسبب بالفعل في آلاف الوفيات سنويًا، وفقًا للخبراء في مؤسسة الصحة العالمية.",

  {id:38, type:"translate", prompt:"يعتقد الأطباء أن الأطفال يجب أن يمارسوا الرياضة. فممارسة الرياضة ممتعة. كما يمكن أن يكون لها آثار إيجابية على الأطفال مما يؤدي إلى تعديل السلوك العدواني لدي بعضهم.",
    dirType:"en", options:{
      a:"Doctors belief that children should practice sports. Practicing sports is enjoyable. However, it can also have positive effects on children, leading to the increasing of aggressive behavior in some children.",
      b:"Doctors belief that children should practice sports. Practicing sports is enjoyable. It can also have positive affects on children, leading to the modification of some children's aggressive behavior.",
      c:"Doctors believe that children should practice sports. Practicing sports is enjoyable. It can also have positive effects on children, leading to the modification of some children's aggressive behavior.",
      d:"Doctors believe that children should practice sports. Practicing sports is enjoyable. It can also have passive effects on children, leading to the increasing of aggressive behavior in some children."},
    correct:"c", explain:"الترجمة (c) هي الصحيحة الكاملة نحويًا وإملائيًا: تستخدم الفعل الصحيح believe (لا belief وهو اسم)، وeffects بالتاء الصحيحة (لا affects وهو فعل)، وتترجم 'تعديل السلوك العدواني' بمعناها الصحيح modification (لا increasing وهو عكس المعنى)؛ بينما تحتوي (a) و(b) على خطأ إملائي (belief بدلاً من believe)، وتحتوي (d) على خطأ في الصفة (passive بدلاً من positive) وخطأ في المعنى (increasing بدلاً من modification)."},
  {id:39, type:"translate", prompt:"أكدت الدراسات الحديثة أن الأجهزة المنزلية المتطورة لم تغير فقط طريقة إنجاز المهام اليومية، بل ساعدت أيضًا في تعزيز الكفاءة وتوفير الوقت وتقليل الاعتماد على العمل اليدوي.",
    dirType:"en", options:{
      a:"Recent studies confirmed that sophisticated household appliances not only changed the way daily chores are completed, but also helped enhance efficiency, save time, and reduce reliance on manual labor.",
      b:"Recent studies confirmed that sophisticated household appliances only changed the way daily chores are completed, but also helped enhance efficiency, waste time, and reduce reliance on manual labor.",
      c:"Recent studies confirmed that sophisticated household appliances not only changed the way daily chores are completed, but also helped weaken efficiency, save time, and reduce reliance on manual labor.",
      d:"Recent studies confirmed that sophisticated household appliances not only charged the way daily chores are completed, but also helped enhance efficiency, save money, and reduce reliance on manual labor."},
    correct:"a", explain:"الترجمة (a) هي الصحيحة الكاملة: تستخدم بنية not only...but also بشكل متكامل وصحيح، وتترجم 'تعزيز الكفاءة' بدقة enhance efficiency، و'توفير الوقت' save time؛ بينما تحتوي (b) على خطأ في الرابط (only بدلاً من not only) وخطأ في المعنى (waste بدلاً من save)، وتحتوي (c) على عكس للمعنى (weaken بدلاً من enhance)، وتحتوي (d) على خطأ إملائي (charged بدلاً من changed) وخطأ في الترجمة (save money بدلاً من save time)."},

  {id:42, type:"essay5", prompt:'Write a paragraph of about SIX (6) lines on the following topic:\n"Actions speak louder than words"',

/* يقسّم القطعة إلى مقاطع (جمل) متطابقة العدد والترتيب بين الإنجليزي والعربي،
   ويضع مباشرة أسفل كل مقطع إنجليزي المقطع العربي المقابل له (مخفي افتراضيًا حتى الضغط على "ترجمة القطعة")،
   بحيث عند تظليل مقطع أثناء النطق يظهر الأصل وترجمته معًا في نفس المكان على الشاشة دون الحاجة للتمرير بينهما. */
function buildPassageHTML(enText, arText, passageId){
  const enSegs = enText.split(/\n+/).map(s=>s.trim()).filter(s=>s.length>0);
  const arSegs = arText ? arText.split(/\n+/).map(s=>s.trim()).filter(s=>s.length>0) : [];
  return enSegs.map((seg,i)=>{
    const arLine = arSegs[i] ? `<div class="pseg pseg-ar-line" data-pid="${passageId}" data-lang="ar" data-idx="${i}">${arSegs[i]}</div>` : '';
    return `<div class="pseg-block">
      <span class="pseg pseg-en" data-pid="${passageId}" data-lang="en" data-idx="${i}">${seg}</span>
      ${arLine}
    </div>`;
  }).join('');
}

function revealAnswer(id){
  const box = document.getElementById('ans-'+id);
  const card = document.getElementById('qcard-'+id);
  const q = findQuestion(id);
  const wasAlreadyAnswered = card.dataset.answered==='1';
  box.classList.add('show');
  if(q && q.options){
    card.querySelectorAll('.opt').forEach(optEl=>{
      const letter = optEl.getAttribute('data-letter');
      if(letter===q.correct) optEl.classList.add('correct');
      else optEl.classList.add('wrong-marked');
    });
  }
  card.dataset.answered = '1';
  if(!wasAlreadyAnswered) playSuccessSound();
  box.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function findQuestion(id){
  const cur = TESTS_DATA[currentTest];
  if(cur){
    const f = cur.questions.find(q=>q.id===id);
    if(f) return f;
  }
  for(const key in TESTS_DATA){
    const found = TESTS_DATA[key].questions.find(q=>q.id===id);
    if(found) return found;
  }
  return null;
}

/* نطق نص السؤال (الجذع) فقط، دون الاختيارات - كل اختيار له زر نطق مستقل بجانبه */
function speakQuestionOnly(id, btn){
  const alreadyPlaying = btn.classList.contains('stop');
  speechSynthesis.cancel();
  resetAllSpeakButtons();
  clearOptionGlow();
  if(alreadyPlaying) return; // كان يعمل بالفعل -> إيقاف فقط، بدون إعادة تشغيل
  const q = findQuestion(id);
  if(!q) return;
  let lang = 'en';
  if(q.type==='translate'){ lang = q.dirType==='ar' ? 'en' : 'ar'; }
  const utter = makeUtterance(q.prompt, lang);
  if(!btn.dataset.orig) btn.dataset.orig = btn.textContent;
  btn.classList.add('stop');
  btn.textContent = '⏹ إيقاف';
  utter.onend = ()=>{ btn.classList.remove('stop'); btn.textContent = btn.dataset.orig; };
  speechSynthesis.speak(utter);
}

/* نطق اختيار واحد بمفرده، ويُضيء (يتوهج) الاختيار أثناء نطقه */
function speakOption(id, letter, btn){
  const q = findQuestion(id);
  if(!q) return;
  speechSynthesis.cancel();
  resetAllSpeakButtons();
  clearOptionGlow();
  let lang = 'en';
  if(q.type==='translate'){ lang = q.dirType==='ar' ? 'ar' : 'en'; }
  const optEl = document.getElementById('opt-'+id+'-'+letter);
  if(optEl) optEl.classList.add('opt-glow');
  btn.classList.add('playing');
  const utter = makeUtterance(q.options[letter], lang);
  utter.onend = ()=>{
    btn.classList.remove('playing');
    if(optEl) optEl.classList.remove('opt-glow');
  };
  speechSynthesis.speak(utter);
}

function clearOptionGlow(){
  document.querySelectorAll('.opt.opt-glow').forEach(o=>o.classList.remove('opt-glow'));
  document.querySelectorAll('.opt-speak.playing').forEach(b=>b.classList.remove('playing'));
}

/* ============ التفاعل: اختيار إجابة بالنقر مباشرة على الاختيار ============ */
function selectAnswer(id, letter, el){
  const q = findQuestion(id);
  if(!q || !q.correct) return;
  const card = document.getElementById('qcard-'+id);
  if(card.dataset.answered==='1') return;
  if(letter === q.correct){
    card.dataset.answered = '1';
    playSuccessSound();
    burstConfetti(el);
    dropBadge(el, '🎉');
    revealAnswer(id);
  } else {
    el.classList.add('shake-wrong');
    playWrongSound();
    setTimeout(()=> el.classList.remove('shake-wrong'), 500);
  }
}

/* ============ أصوات تفاعلية وتأثيرات احتفالية (بدون إنترنت - Web Audio) ============ */
let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function playTone(freq, start, dur, type, peak){
  try{
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type||'sine'; osc.frequency.value = freq;
    osc.connect(gain); gain.connect(ctx.destination);
    const t0 = ctx.currentTime + start;
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.linearRampToValueAtTime(peak||0.22, t0+0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t0+dur);
    osc.start(t0); osc.stop(t0+dur+0.03);
  }catch(e){}
}
function playSuccessSound(){
  playTone(523.25, 0.00, 0.16, 'triangle', 0.22);
  playTone(659.25, 0.09, 0.16, 'triangle', 0.22);
  playTone(783.99, 0.18, 0.20, 'triangle', 0.24);
  playTone(1046.5, 0.30, 0.34, 'triangle', 0.26);
}
function playWrongSound(){
  playTone(220, 0.00, 0.14, 'sawtooth', 0.14);
  playTone(174, 0.10, 0.20, 'sawtooth', 0.14);
}
function burstConfetti(anchorEl){
  const rect = anchorEl.getBoundingClientRect();
  const colors = ['#c99a3f','#2f7d5b','#e8c579','#1f3b63','#b5453a'];
  for(let i=0;i<22;i++){
    const p = document.createElement('span');
    p.className = 'confetti-piece';
    p.style.left = (rect.left + rect.width*Math.random())+'px';
    p.style.top = (rect.top + rect.height/2)+'px';
    p.style.background = colors[i%colors.length];
    const dx = (Math.random()-0.5)*180;
    const dy = -(Math.random()*130+70);
    p.style.setProperty('--dx', dx+'px');
    p.style.setProperty('--dy', dy+'px');
    p.style.setProperty('--rot', (Math.random()*360)+'deg');
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 900);
  }
}
function dropBadge(anchorEl, emoji){
  const rect = anchorEl.getBoundingClientRect();
  const b = document.createElement('div');
  b.className = 'correct-badge';
  b.textContent = emoji;
  b.style.left = (rect.left + rect.width - 20)+'px';
  b.style.top = (rect.top - 6)+'px';
  document.body.appendChild(b);
  setTimeout(()=> b.remove(), 1050);
}

function makeUtterance(text, lang){
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = parseFloat(rateSlider.value);
  utter.lang = lang==='en' ? 'en-US' : 'ar-SA';
  const voices = speechSynthesis.getVoices();
  const chosenName = voiceSelect.value;
  let voice = null;
  if(lang!=='en'){ voice = voices.find(v=>v.name===chosenName); }
  if(!voice){ voice = voices.find(v=> v.lang && v.lang.toLowerCase().startsWith(lang)); }
  if(voice) utter.voice = voice;
  return utter;
}

/* ============ نطق القطعة مقطعًا مقطعًا مع تظليل تفاعلي للترجمة ============ */
let passagePlayback = { token: 0 };

function clearPassageHighlight(){
  document.querySelectorAll('.pseg.active').forEach(el=>el.classList.remove('active'));
}

/* ينطق نص القطعة (إنجليزي أو عربي) مقطعًا (سطرًا/جملة) تلو الآخر،
   ويظلّل المقطع الجاري نطقه في كلتا اللغتين معًا (الأصل + الترجمة) بحيث تتفاعل الترجمة مع النطق.
   الضغط على الزر مرة ثانية أثناء التشغيل يوقف النطق فعليًا بدلاً من إعادة تشغيله. */
function speakPassage(passageId, isEnglish, btn){
  const alreadyPlaying = btn.classList.contains('stop');
  speechSynthesis.cancel();
  resetAllSpeakButtons();
  if(alreadyPlaying) return; // كان يعمل بالفعل -> إيقاف فقط، بدون إعادة تشغيل

  const lang = isEnglish ? 'en' : 'ar';
  if(!isEnglish) ensurePassageArVisible(passageId);
  const segEls = Array.from(document.querySelectorAll(`.pseg[data-pid="${passageId}"][data-lang="${lang}"]`))
    .sort((a,b)=> (+a.dataset.idx) - (+b.dataset.idx));
  if(segEls.length===0) return;

  const myToken = passagePlayback.token;
  if(!btn.dataset.orig) btn.dataset.orig = btn.textContent;
  btn.classList.add('stop');
  btn.textContent = '⏹ إيقاف النطق';

  let i = 0;
  function playNext(){
    if(myToken !== passagePlayback.token) return; // تم إيقافه أو بدأ نطق آخر
    if(i >= segEls.length){
      btn.classList.remove('stop');
      btn.textContent = btn.dataset.orig;
      clearPassageHighlight();
      return;
    }
    clearPassageHighlight();
    document.querySelectorAll(`.pseg[data-pid="${passageId}"][data-idx="${i}"]`).forEach(el=> el.classList.add('active'));
    const activeSeg = segEls[i];
    activeSeg.scrollIntoView({behavior:'smooth', block:'center'});
    const utter = makeUtterance(activeSeg.textContent, lang);
    utter.onend = ()=>{ if(myToken===passagePlayback.token){ i++; playNext(); } };
    utter.onerror = ()=>{ if(myToken===passagePlayback.token){ i++; playNext(); } };
    speechSynthesis.speak(utter);
  }
  playNext();
}

/* يقرأ السؤال كاملاً: النص + الاختيارات + الإجابة الصحيحة + الشرح، بالتبديل التلقائي بين العربي والإنجليزي */
function speakFull(id, btn){
  const alreadyPlaying = btn.classList.contains('stop');
  speechSynthesis.cancel();
  resetAllSpeakButtons();
  if(alreadyPlaying) return; // كان يعمل بالفعل -> إيقاف فقط، بدون إعادة تشغيل

  const q = findQuestion(id);
  if(!q) return;

  let parts = [];
  if(q.type==='mcq'){
    parts.push({text:q.prompt, lang:'en'});
    ['a','b','c','d'].forEach(k=> parts.push({text:k+') '+q.options[k], lang:'en'}));
    parts.push({text:'الإجابة الصحيحة هي: '+q.correct, lang:'ar'});
    parts.push({text:q.options[q.correct], lang:'en'});
    parts.push({text:q.explain, lang:'ar'});
  } else if(q.type==='translate'){
    const promptLang = q.dirType==='ar' ? 'en' : 'ar';
    const optLang = q.dirType==='ar' ? 'ar' : 'en';
    parts.push({text:q.prompt, lang:promptLang});
    ['a','b','c','d'].forEach(k=> parts.push({text:k+') '+q.options[k], lang:optLang}));
    parts.push({text:'الترجمة الصحيحة هي: '+q.correct, lang:'ar'});
    parts.push({text:q.explain, lang:'ar'});
  } else if(q.type==='essay' || q.type==='essay5'){
    parts.push({text:q.prompt, lang:'en'});
    parts.push({text:'الإجابة النموذجية', lang:'ar'});
    parts.push({text:q.model, lang:'en'});
    parts.push({text:q.explain, lang:'ar'});
  }

  if(!btn.dataset.orig) btn.dataset.orig = btn.textContent;
  btn.classList.add('stop');
  btn.textContent = '⏹ إيقاف النطق';

  parts.forEach((p, idx)=>{
    const utter = makeUtterance(p.text, p.lang);
    if(idx===parts.length-1){
      utter.onend = ()=>{ btn.classList.remove('stop'); btn.textContent = btn.dataset.orig; };
    }
    speechSynthesis.speak(utter);
  });
  currentUtterance = true;
}

document.getElementById('stopSpeak').onclick = ()=>{
  speechSynthesis.cancel();
  resetAllSpeakButtons();
};

/* ============ UI CONTROLS ============ */
const sidebarEl = document.getElementById('sidebar');
const backdropEl = document.getElementById('backdrop');
function isMobile(){ return window.innerWidth <= 640; }

function closeMobileSidebar(){
  sidebarEl.classList.remove('mobile-open');
  backdropEl.classList.remove('show');
}
function openMobileSidebar(){
  sidebarEl.classList.add('mobile-open');
  backdropEl.classList.add('show');
}

document.getElementById('sidebarToggle').onclick = ()=>{
  if(isMobile()){
    if(sidebarEl.classList.contains('mobile-open')) closeMobileSidebar();
    else openMobileSidebar();
  } else {
    sidebarEl.classList.toggle('collapsed');
  }
};
backdropEl.onclick = closeMobileSidebar;

document.getElementById('fullscreenBtn').onclick = ()=>{
  if(!document.fullscreenElement){ document.documentElement.requestFullscreen().catch(()=>{}); }
  else{ document.exitFullscreen(); }
};
document.getElementById('expandAll').onclick = ()=>{
  document.querySelectorAll('.card').forEach(c=>c.classList.add('open'));
};
document.getElementById('collapseAll').onclick = ()=>{
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('open'));
};
